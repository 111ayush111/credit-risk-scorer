<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Risk Scorer</title>
</head>
<body style="font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px;">

  <h2>Credit Risk Scorer</h2>

  <form id="riskForm">
    <label>Age</label><br/>
    <input type="number" id="age" value="30" required/><br/><br/>

    <label>Monthly Income (INR)</label><br/>
    <input type="number" id="income" value="45000" required/><br/><br/>

    <label>Loan Amount (INR)</label><br/>
    <input type="number" id="loan_amount" value="12000" required/><br/><br/>

    <label>Credit History (years)</label><br/>
    <input type="number" id="credit_history_years" value="5" required/><br/><br/>

    <label>Existing Loans</label><br/>
    <input type="number" id="existing_loans" value="1" required/><br/><br/>

    <label>Employment (years)</label><br/>
    <input type="number" id="employment_years" value="3" required/><br/><br/>

    <label>Debt to Income Ratio</label><br/>
    <input type="number" step="0.01" id="debt_to_income" value="0.27" required/><br/><br/>

    <button type="submit">Check Risk</button>
  </form>

  <div id="result" style="margin-top: 24px;"></div>

  <script>
    const API_URL = "http://127.0.0.1:8000/predict";

    document.getElementById("riskForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const resultDiv = document.getElementById("result");
      resultDiv.innerHTML = "<p style='color: gray;'>Calculating risk...</p>";

      const payload = {
        age: Number(document.getElementById("age").value),
        income: Number(document.getElementById("income").value),
        loan_amount: Number(document.getElementById("loan_amount").value),
        credit_history_years: Number(document.getElementById("credit_history_years").value),
        existing_loans: Number(document.getElementById("existing_loans").value),
        employment_years: Number(document.getElementById("employment_years").value),
        debt_to_income: Number(document.getElementById("debt_to_income").value)
      };

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        // Check if response is successful and contains required keys
        if (!res.ok || data.detail || !data.top_reasons) {
          throw new Error(data.detail ? JSON.stringify(data.detail) : "Server error (500)");
        }

        let reasonsHtml = data.top_reasons.map(r =>
          `<li><b>${r.feature}</b> &mdash; ${r.effect} (impact: ${r.impact})</li>`
        ).join("");

        // Highlight text based on risk category
        const color = data.prediction === "High Risk" ? "red" : "green";

        resultDiv.innerHTML = `
          <h3 style="color: ${color};">${data.prediction}</h3>
          <p>Risk probability: <b>${(data.risk_probability * 100).toFixed(1)}%</b></p>
          <p><b>Top reasons:</b></p>
          <ul>${reasonsHtml}</ul>
        `;

      } catch (error) {
        console.error(error);
        resultDiv.innerHTML = `
          <div style="padding: 10px; background-color: #fee2e2; border: 1px solid #ef4444; color: #b91c1c; border-radius: 4px;">
            <strong>Error:</strong> ${error.message}<br/>
            <small style="color: #7f1d1d;">Check if Uvicorn is running on port 8000 and check terminal logs.</small>
          </div>
        `;
      }
    });
  </script>

</body>
</html>
