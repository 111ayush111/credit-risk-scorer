<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Risk Scorer</title>
</head>
<body style="font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px;">

  <h2>Credit Risk Scorer</h2>

  <form id="riskForm">
    <label>Age</label><br/>
    <input type="number" id="age" value="30" required/><br/><br/>

    <label>Monthly Income (INR)</label><br/>
    <input type="number" id="income" value="45000" required/><br/><br/>

    <label>Loan Amount (INR)</label><br/>
    <input type="number" id="loan_amount" value="12000" required/><br/><br/>

    <label>Credit History (years)</label><br/>
    <input type="number" id="credit_history_years" value="5" required/><br/><br/>

    <label>Existing Loans</label><br/>
    <input type="number" id="existing_loans" value="1" required/><br/><br/>

    <label>Employment (years)</label><br/>
    <input type="number" id="employment_years" value="3" required/><br/><br/>

    <label>Debt to Income Ratio</label><br/>
    <input type="number" step="0.01" id="debt_to_income" value="0.27" required/><br/><br/>

    <button type="submit">Check Risk</button>
  </form>

  <!-- FIXED: Purana duplicate result div yahan se remove kar diya hai -->

  <!-- HTML Result Area (Styled container with Gemini insights block) -->
  <div id="result" style="margin-top: 24px; padding: 15px; border-radius: 8px; display: none; background: #f9f9f9; border: 1px solid #ddd;">
      <h3 id="predictionText"></h3>
      <p><b>Risk Probability:</b> <span id="probText"></span></p>
      
      <p><b>Top Mathematical Reasons:</b></p>
      <ul id="reasonsList"></ul>
      
      <div style="margin-top: 15px; padding: 12px; background: #eef7ff; border-left: 4px solid #007bff; border-radius: 4px;">
          <h4 style="margin: 0 0 8px 0; color: #0056b3;">🤖 Gemini AI Financial Advisory:</h4>
          <p id="geminiText" style="margin: 0; font-size: 14px; line-height: 1.5; font-style: italic;"></p>
      </div>
  </div>

<script>
const API_URL = "https://credit-risk-scorer-axtk.onrender.com/predict"; 

document.getElementById("riskForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    
    const payload = {
        age: Number(document.getElementById("age").value),
        income: Number(document.getElementById("income").value),
        loan_amount: Number(document.getElementById("loan_amount").value),
        credit_history_years: Number(document.getElementById("credit_history_years").value),
        existing_loans: Number(document.getElementById("existing_loans").value),
        employment_years: Number(document.getElementById("employment_years").value),
        debt_to_income: Number(document.getElementById("debt_to_income").value)
    };
    
    const resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";
    document.getElementById("predictionText").innerText = "Analyzing Risk...";
    document.getElementById("predictionText").style.color = "#333";
    document.getElementById("probText").innerText = "Calculating...";
    document.getElementById("reasonsList").innerHTML = "";
    document.getElementById("geminiText").innerText = "Gemini is thinking...";
    
    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        
        const data = await res.json();
        
        // Update Risk predictions
        document.getElementById("predictionText").innerText = data.prediction;
        document.getElementById("predictionText").style.color = data.prediction === "High Risk" ? "#d9534f" : "#5cb85c";
        document.getElementById("probText").innerText = (data.risk_probability * 100).toFixed(1) + "%";
        
        // Update Math Reasons
        let reasonsHtml = data.top_reasons.map(r => 
            `<li><b>${r.feature.replace(/_/g, ' ')}</b> &mdash; ${r.effect} (impact: ${r.impact})</li>`
        ).join("");
        document.getElementById("reasonsList").innerHTML = reasonsHtml;
        
        // Update Gemini Insights
        document.getElementById("geminiText").innerText = data.gemini_recommendation;
        
    } catch (error) {
        document.getElementById("predictionText").innerText = "Error connecting to server.";
        document.getElementById("predictionText").style.color = "#d9534f";
        document.getElementById("geminiText").innerText = "Could not load recommendation. Check terminal or logs.";
    }
});
</script>

</body>
</html>
